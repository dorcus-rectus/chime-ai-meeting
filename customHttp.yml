customHeaders:
  # index.html はキャッシュしない (新デプロイ後に即時反映)
  - pattern: '/index.html'
    headers:
      - key: 'Cache-Control'
        value: 'no-cache, no-store, must-revalidate'
      - key: 'Pragma'
        value: 'no-cache'
  # JS/CSS バンドルはコンテンツハッシュ付きファイル名のため長期キャッシュ可
  - pattern: '/assets/**'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'
  # aibot.mp4 などの静的アセットも適度にキャッシュ (1 週間)
  - pattern: '**/*.mp4'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=604800'
  - pattern: '**/*'
    headers:
      # HTTP Strict Transport Security: HTTPS 通信を 1 年間強制
      - key: 'Strict-Transport-Security'
        value: 'max-age=31536000; includeSubDomains; preload'
      # クリックジャッキング対策: iframe 埋め込みを禁止
      - key: 'X-Frame-Options'
        value: 'DENY'
      # MIME スニッフィング対策
      - key: 'X-Content-Type-Options'
        value: 'nosniff'
      # リファラー情報: クロスオリジン時はオリジンのみ公開
      - key: 'Referrer-Policy'
        value: 'strict-origin-when-cross-origin'
      # Content Security Policy
      # Chime SDK の要件:
      #   - connect-src https://*.chime.aws: worker-v1.js / ingest エンドポイント (HTTPS)
      #   - connect-src wss://*.chime.aws: WebSocket 音声・映像転送
      #   - worker-src blob:: Chime SDK が Blob URL から Web Worker を生成
      #   - media-src blob:: Polly 音声を Blob URL で再生
      #   - script-src 'unsafe-inline': Vite バンドル (インライン不使用時は削除可)
      #   - script-src 'wasm-unsafe-eval': Chime SDK の VoiceFocus WebAssembly 実行に必要
      - key: 'Content-Security-Policy'
        value: "default-src 'self'; connect-src 'self' https://*.amazonaws.com https://*.amazoncognito.com https://*.chime.aws wss://*.amazonaws.com wss://*.chime.aws; worker-src blob:; media-src 'self' blob:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval';"

customHeaders:
  - pattern: '**/*'
    headers:
      # HTTP Strict Transport Security: HTTPS 通信を 1 年間強制
      - key: 'Strict-Transport-Security'
        value: 'max-age=31536000; includeSubDomains; preload'
      # クリックジャッキング対策: iframe 埋め込みを禁止
      - key: 'X-Frame-Options'
        value: 'DENY'
      # MIME スニッフィング対策
      - key: 'X-Content-Type-Options'
        value: 'nosniff'
      # リファラー情報: クロスオリジン時はオリジンのみ公開
      - key: 'Referrer-Policy'
        value: 'strict-origin-when-cross-origin'
      # Content Security Policy
      # Chime SDK の要件:
      #   - connect-src: WebSocket (wss://) で音声・映像転送
      #   - media-src blob:: Polly 音声を Blob URL で再生
      #   - script-src 'unsafe-inline': Vite バンドル (インライン不使用時は削除可)
      - key: 'Content-Security-Policy'
        value: "default-src 'self'; connect-src 'self' https://*.amazonaws.com https://*.amazoncognito.com wss://*.amazonaws.com wss://*.chime.aws; media-src 'self' blob:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';"
